[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Branch preview deployments
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Sanity Studio static assets
[[redirects]]
  from = "/static/*"
  to = "/studio/static/:splat"
  status = 200

[[redirects]]
  from = "https://www.globalhopeindia.org/*"
  to = "https://globalhopeindia.org/:splat"
  status = 301
  force = true

# WordPress → Astro URL redirects
[[redirects]]
  from = "/about-ghi/"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/about-ghi"
  to = "/about/"
  status = 301

# WordPress admin → Sanity Studio
[[redirects]]
  from = "/wp-admin"
  to = "/studio/"
  status = 301

[[redirects]]
  from = "/wp-admin/*"
  to = "/studio/"
  status = 301

[[redirects]]
  from = "/wp-login.php"
  to = "/studio/"
  status = 301

# WordPress feed → blog
[[redirects]]
  from = "/feed/"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/feed"
  to = "/blog/"
  status = 301

# WordPress category/tag pages → blog
[[redirects]]
  from = "/category/*"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/tag/*"
  to = "/blog/"
  status = 301

# WordPress paginated pages
[[redirects]]
  from = "/page/*"
  to = "/"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://cdn.sanity.io https://assets.spiritmediapublishing.com https://globalhopeindia.org https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://r33r2z1j.api.sanity.io https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com; frame-src https://www.youtube.com https://givebutter.com; media-src 'self' https://assets.spiritmediapublishing.com https://globalhopeindia.org; object-src 'none'; base-uri 'self'; form-action 'self' https://givebutter.com"
