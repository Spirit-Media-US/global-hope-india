[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Branch preview deployments
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Sanity Studio static assets
[[redirects]]
  from = "/static/*"
  to = "/studio/static/:splat"
  status = 200

# TODO: Update domain before going live
[[redirects]]
  from = "https://www.REPLACE_DOMAIN.com/*"
  to = "https://REPLACE_DOMAIN.com/:splat"
  status = 301
  force = true
